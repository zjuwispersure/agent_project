planning_task:
  description: >
    为关于 {topic} 的博客文章创建一份详细的中文大纲。

    大纲应包含：
    - 一个吸引人的标题
    - 引言钩子
    - 3-5 个主要章节，每章列出要点
    - 结论及行动号召

    大纲要足够详细，让写手无需额外研究就能写出完整的博客文章。
    全部用中文输出。
  expected_output: >
    一份结构化的中文博客文章大纲，包含标题、引言笔记、
    详细的章节分解和结论笔记。
  agent: planner

writing_task:
  description: >
    根据提供的大纲，撰写一篇关于 {topic} 的完整中文博客文章。

    要求：
    - 严格遵循大纲结构
    - 语言清晰、生动、口语化
    - 每个章节 2-3 段
    - 包含有力的引言和结论
    - 约 800-1200 字
    全部用中文输出。
  expected_output: >
    一篇完整的中文博客文章（Markdown 格式），
    结构清晰、段落过渡自然，可直接用于编辑。
  agent: writer

editing_task:
  description: >
    审阅并编辑关于 {topic} 的中文博客文章。

    重点关注：
    - 修正语法和拼写错误
    - 改善句子清晰度和流畅度
    - 确保全文语气一致
    - 强化引言和结论
    - 删除冗余内容

    不要重写文章，只需打磨润色。
    全部用中文输出。
  expected_output: >
    最终润色完成的中文博客文章（纯 Markdown 格式，不含 '```'），
    排版整洁、专业，可直接发布。
  agent: editor
  output_file: output/post.md
